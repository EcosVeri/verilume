name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    # 3.14 is exercised but not required to pass while the Chroma/OCR/onnxruntime
    # stack finishes 3.14 support (see project review notes).
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src tests launcher.py scripts

      - name: Compile
        run: python -m compileall -q src tests launcher.py scripts/build_macos_app.py

      - name: Unit tests
        # pytest loads tests/conftest.py, which redirects HOME to a temp dir so
        # the suite is hermetic and never touches a real ~/.verilume store.
        run: python -m pytest tests -q

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: python -m pip install pip-audit

      # Advisory for now: report known-vulnerable dependencies without blocking
      # every PR on a transitive advisory. Tighten to a hard gate once the
      # dependency tree is clean.
      - name: Audit dependencies
        continue-on-error: true
        run: pip-audit --strict --progress-spinner off
